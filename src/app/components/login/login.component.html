<div class="auth-page">
  <div class="auth-card">
      <app-brand link="/" />
    <h1>Entrar</h1>
    <p class="subtitle">Acesse sua conta para consultar CNPJs</p>

    <form (ngSubmit)="entrar()">
      <label class="field">
        <span>E-mail</span>
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
      </label>

      <label class="field">
        <span>Senha</span>
        <input type="password" name="password" [(ngModel)]="password" required minlength="8" autocomplete="current-password" />
      </label>
      <p class="forgot-link">
        <a routerLink="/esqueci-senha">Esqueci minha senha</a>
      </p>

      <button class="btn btn-primary" type="submit" [disabled]="enviando()">
        @if (enviando()) {
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>

    @if (erro()) {
      <div class="alert alert-error">{{ erro() }}</div>
    }

    @if (emailNaoConfirmado()) {
      <p class="footer-link">
        <a [routerLink]="['/cadastro-pendente']" [queryParams]="{ email: email }">Reenviar link de confirmação</a>
      </p>
    }

    <p class="footer-link">
      Não tem conta? <a routerLink="/cadastro" appAnalyticsCta="cadastrar" appAnalyticsCtaLocation="login_footer">Cadastre-se</a>
      · <a routerLink="/" appAnalyticsCta="sobre" appAnalyticsCtaLocation="login_footer">Sobre o Lupa Insights</a>
    </p>
    <app-legal-footer-links />
  </div>
</div>
