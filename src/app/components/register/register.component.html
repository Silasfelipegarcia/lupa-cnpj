<div class="auth-page">
  <div class="auth-card">
      <app-brand link="/" />
    <h1>{{ tituloCadastro }}</h1>
    <p class="subtitle">{{ subtituloCadastro }}</p>

    <ul class="signup-benefits">
      @for (benefit of trialBenefits; track benefit) {
        <li>{{ benefit }}</li>
      }
    </ul>

    <form (ngSubmit)="cadastrar()">
      <label class="field">
        <span>Nome completo</span>
        <input type="text" name="nome" [(ngModel)]="nome" required autocomplete="name" />
      </label>

      <label class="field">
        <span>E-mail</span>
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
      </label>

      <label class="field">
        <span>CPF</span>
        <input
          type="text"
          name="cpf"
          [value]="cpf"
          (input)="onCpfInput($event)"
          required
          inputmode="numeric"
          placeholder="000.000.000-00"
          autocomplete="off"
        />
        <span class="field-hint">Exigido para sua conta e futura cobrança; cartão só se quiser continuar após o trial.</span>
      </label>

      <label class="field">
        <span>Senha</span>
        <input type="password" name="password" [(ngModel)]="password" required minlength="8" autocomplete="new-password" />
      </label>

      <label class="field">
        <span>Confirmar senha</span>
        <input type="password" name="confirmarSenha" [(ngModel)]="confirmarSenha" required minlength="8" autocomplete="new-password" />
      </label>

      <label class="field field-checkbox">
        <input type="checkbox" name="aceitoTermos" [(ngModel)]="aceitoTermos" required />
        <span>
          Li e aceito os
          <a routerLink="/termos" appAnalyticsCta="termos" appAnalyticsCtaLocation="signup_form">Termos de Uso</a>
          e a
          <a routerLink="/privacidade" appAnalyticsCta="privacidade" appAnalyticsCtaLocation="signup_form">Política de Privacidade</a>.
        </span>
      </label>

      <button class="btn btn-primary" type="submit" [disabled]="enviando() || !aceitoTermos">
        @if (enviando()) {
          Criando conta...
        } @else {
          Criar conta e começar trial
        }
      </button>
    </form>

    @if (erro()) {
      <div class="alert alert-error">{{ erro() }}</div>
    }

    <p class="footer-link">
      Já tem conta? <a routerLink="/login" appAnalyticsCta="entrar" appAnalyticsCtaLocation="signup_footer">Entrar</a>
      · <a routerLink="/" appAnalyticsCta="sobre" appAnalyticsCtaLocation="signup_footer">Sobre o Lupa Insights</a>
    </p>
    <app-legal-footer-links />
  </div>
</div>
