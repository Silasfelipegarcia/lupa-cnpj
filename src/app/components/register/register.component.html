<div class="auth-page">
  <div class="auth-card">
      <app-brand link="/" />
    <h1>Criar conta</h1>
    <p class="subtitle">Cadastre-se para usar o LupaCNPJ</p>

    <form (ngSubmit)="cadastrar()">
      <label class="field">
        <span>Nome completo</span>
        <input type="text" name="nome" [(ngModel)]="nome" required autocomplete="name" />
      </label>

      <label class="field">
        <span>E-mail</span>
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
      </label>

      <label class="field">
        <span>CPF</span>
        <input
          type="text"
          name="cpf"
          [value]="cpf"
          (input)="onCpfInput($event)"
          required
          inputmode="numeric"
          placeholder="000.000.000-00"
          autocomplete="off"
        />
      </label>

      <label class="field">
        <span>Senha</span>
        <input type="password" name="password" [(ngModel)]="password" required minlength="8" autocomplete="new-password" />
      </label>

      <label class="field">
        <span>Confirmar senha</span>
        <input type="password" name="confirmarSenha" [(ngModel)]="confirmarSenha" required minlength="8" autocomplete="new-password" />
      </label>

      <button class="btn btn-primary" type="submit" [disabled]="enviando()">
        @if (enviando()) {
          Cadastrando...
        } @else {
          Cadastrar
        }
      </button>
    </form>

    @if (erro()) {
      <div class="alert alert-error">{{ erro() }}</div>
    }

    <p class="footer-link">
      Já tem conta? <a routerLink="/login">Entrar</a>
    </p>
  </div>
</div>
