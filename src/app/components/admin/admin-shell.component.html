        <p class="admin-sidebar-eyebrow">Administração</p>
        <h2 class="admin-sidebar-title">Painel do produto</h2>
        <nav class="admin-nav">
          <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
