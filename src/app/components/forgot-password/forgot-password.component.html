<div class="auth-page">
  <div class="auth-card">
    <app-brand link="/" />
    <h1>Esqueci minha senha</h1>
    <p class="subtitle">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>

    @if (!sucesso()) {
      <form (ngSubmit)="enviar()">
        <label class="field">
          <span>E-mail</span>
          <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
        </label>

        <button class="btn btn-primary" type="submit" [disabled]="enviando()">
          @if (enviando()) {
            Enviando...
          } @else {
            Enviar link
          }
        </button>
      </form>
    } @else {
      <div class="alert alert-success">{{ sucesso() }}</div>
    }

    @if (erro()) {
      <div class="alert alert-error">{{ erro() }}</div>
    }

    <p class="footer-link">
      <a routerLink="/login">Voltar para entrar</a>
      · <a routerLink="/cadastro">Criar conta</a>
    </p>
    <app-legal-footer-links />
  </div>
</div>
